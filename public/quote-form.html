<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request a Quote — REmixed Events</title>
  <!-- DJ Event Planner framework styles (scoped to this isolated document) -->
  <link rel="stylesheet" href="https://remixedent.com/clients/includes/mobile-framework.css" />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&f[]=clash-display@600,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --grad: linear-gradient(115deg, #2a1ce8 0%, #7b2ff7 48%, #dc1ee3 100%);
      --grad-soft: linear-gradient(115deg, #3a2cff 0%, #9d2be0 55%, #ff3dc0 100%);
      --ink: #08040f; --surface: #160c25; --line: rgba(255,255,255,.12);
      --text: #f6f1fc; --dim: #c7b9dd; --mute: #9685b0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: transparent; }
    body {
      font-family: 'General Sans', system-ui, sans-serif;
      color: var(--text);
      padding: 0;
    }
    .qf-wrap { max-width: 720px; margin: 0 auto; }

    /* Neutralize their inline form chrome and reskin */
    form[name="reqinfoform"] { margin: 0 !important; }
    form[name="reqinfoform"] > div { border: 0 !important; }
    /* Their pink header bar -> gradient header */
    form[name="reqinfoform"] > div > div:first-child {
      background: var(--grad) !important;
      border-radius: 20px 20px 0 0;
      padding: 1.25rem !important;
    }
    form[name="reqinfoform"] > div > div:first-child strong {
      font-family: 'Clash Display', sans-serif;
      font-weight: 600; font-size: 1.15rem; letter-spacing: -.01em;
    }
    /* Body panel */
    form[name="reqinfoform"] > div > div:last-child {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--line);
      border-top: 0;
      border-radius: 0 0 20px 20px;
      padding: 1.6rem clamp(1rem, 4vw, 1.8rem) !important;
    }
    .padding-lr-5, .form-group > div:first-child div { color: var(--dim) !important; font-weight: 500; font-size: .92rem; }
    .form-group { margin-bottom: .65rem !important; }

    /* Inputs */
    input[type=text], input[type=email], input[type=tel],
    select, textarea {
      width: 100% !important;
      background: rgba(255,255,255,.04) !important;
      border: 1px solid var(--line) !important;
      border-radius: 12px !important;
      color: var(--text) !important;
      padding: .7rem .85rem !important;
      font-family: inherit !important;
      font-size: .95rem !important;
      height: auto !important;
      box-shadow: none !important;
      transition: border-color .25s ease, background .25s ease;
    }
    select option { color: #111; }
    input:focus, select:focus, textarea:focus {
      outline: none !important;
      border-color: #b042ff !important;
      background: rgba(255,255,255,.07) !important;
    }
    textarea { min-height: 110px; resize: vertical; }
    #date_select select { width: 31% !important; }

    .questiontitle, label { color: var(--dim) !important; font-size: .88rem; }
    a { color: #ff5cc8; }

    /* Submit button -> brand gradient pill */
    .formbutton {
      background: var(--grad) !important;
      border: 0 !important;
      color: #fff !important;
      font-family: 'General Sans', sans-serif !important;
      font-size: 1rem !important;
      font-weight: 600 !important;
      letter-spacing: .01em !important;
      border-radius: 999px !important;
      padding: .95rem 2.4rem !important;
      margin: 1rem auto !important;
      cursor: pointer;
      box-shadow: 0 14px 30px -12px rgba(220,30,227,.7);
      transition: transform .3s ease, box-shadow .3s ease;
    }
    .formbutton:hover { transform: translateY(-2px); box-shadow: 0 20px 40px -12px rgba(220,30,227,.8); }
    p { color: var(--mute); }
  </style>
</head>
<body>
  <div class="qf-wrap">
    <!-- BEGIN DJEVENTPLANNER CODE -->
    <div class="col-xs-12">
      <script src='https://remixedent.com/check_req_info_form.js?v=ubp' language='javascript' type='text/javascript'></script>
      <script>if(!window.jQuery){var script = document.createElement('script');script.type = 'text/javascript';script.src = 'https://ajax.googleapis.com/ajax/libs/jquery/1.8.1/jquery.min.js';document.getElementsByTagName('head')[0].appendChild(script);}</script>
      <form method="post" action="https://remixedent.com/request_information.asp" onSubmit="return submitIt(this);" name="reqinfoform">
        <div>
          <div align="center"><div><strong>REmixed Events<br>Information Request</strong></div></div>
          <div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">Date Of Event</div></div>
              <div class="col-sm-8 col-md-9"><span class="metro-table" id="date_select"><select name=month class=monthselect><option value=43>Month</option><option value=1>January</option><option value=2>February</option><option value=3>March</option><option value=4>April</option><option value=5>May</option><option value=6>June</option><option value=7>July</option><option value=8>August</option><option value=9>September</option><option value=10>October</option><option value=11>November</option><option value=12>December</option></select>
                <select name=day class=dayselect><option value=43>Day</option><option value=1>1</option><option value=2>2</option><option value=3>3</option><option value=4>4</option><option value=5>5</option><option value=6>6</option><option value=7>7</option><option value=8>8</option><option value=9>9</option><option value=10>10</option><option value=11>11</option><option value=12>12</option><option value=13>13</option><option value=14>14</option><option value=15>15</option><option value=16>16</option><option value=17>17</option><option value=18>18</option><option value=19>19</option><option value=20>20</option><option value=21>21</option><option value=22>22</option><option value=23>23</option><option value=24>24</option><option value=25>25</option><option value=26>26</option><option value=27>27</option><option value=28>28</option><option value=29>29</option><option value=30>30</option><option value=31>31</option></select>
                <select name=year class=yearselect><option value=43>Year</option><option value=2026 selected>2026</option><option value=2027>2027</option><option value=2028>2028</option><option value=2029>2029</option><option value=2030>2030</option><option value=2031>2031</option><option value=2032>2032</option></select>
              </span><script>$('#date_select select').addClass('form-control');</script></div>
              <div class="cf"></div>
            </div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">First Name</div></div>
              <div class="col-sm-8 col-md-9"><input type="text" class="form-control" id="first_name" name="first_name"></div>
              <div class="cf"></div>
            </div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">Last Name</div></div>
              <div class="col-sm-8 col-md-9"><input type="text" class="form-control" id="last_name" name="last_name"></div>
              <div class="cf"></div>
            </div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">Organization / Fiancé</div></div>
              <div class="col-sm-8 col-md-9"><input type="text" class="form-control" id="organization" name="organization"></div>
              <div class="cf"></div>
            </div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">Email Address</div></div>
              <div class="col-sm-8 col-md-9"><input type="email" class="form-control" id="email" name="email"></div>
              <div class="cf"></div>
            </div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">City *</div></div>
              <div class="col-sm-8 col-md-9"><input type="text" class="form-control" id="city" name="city"></div>
              <div class="cf"></div>
            </div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">State *</div></div>
              <div class="col-sm-8 col-md-9"><select name="state" class="form-control"><option value="">Select...</option><option value=FL selected>Florida</option><option value=AL>Alabama</option><option value=AK>Alaska</option><option value=AZ>Arizona</option><option value=AR>Arkansas</option><option value=CA>California</option><option value=CO>Colorado</option><option value=CT>Connecticut</option><option value=DE>Delaware</option><option value=GA>Georgia</option><option value=HI>Hawaii</option><option value=IL>Illinois</option><option value=NY>New York</option><option value=NJ>New Jersey</option><option value=NC>North Carolina</option><option value=TX>Texas</option><option value=VA>Virginia</option><option value=WA>Washington</option><option value=Other>Other</option></select></div>
              <div class="cf"></div>
            </div>
            <input type='hidden' name='country' value='US'>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">Telephone</div></div>
              <div class="col-sm-8 col-md-9"><input type="tel" class="form-control" id="telephone" name="telephone"></div>
              <div class="cf"></div>
            </div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">Type Of Event</div></div>
              <div class="col-sm-8 col-md-9"><select name=event_type class="form-control"><option value=''>Please select...</option><option>Corporate Event</option><option>Company Holiday Party</option><option>Brand Activation / Product Launch</option><option>Wedding</option><option>VIP / Private Party</option><option>Influencer Event</option><option>Wellness Retreat</option><option>Birthday Party</option><option>Quinceanera</option><option>Sweet 16</option><option>Community Celebration</option><option>Other / Not Listed</option></select></div>
              <div class="cf"></div>
            </div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">Venue & Event Details</div></div>
              <div class="col-sm-8 col-md-9"><textarea name=additional_information rows=5 class="form-control"></textarea></div>
              <div class="cf"></div>
            </div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">Approximate Guest Count *<input type=hidden id=q2_required name=q2_required value=TRUE></div></div>
              <div class="col-sm-8 col-md-9"><input class="form-control" type=text name=question_2 maxlength=250></div>
              <div class="cf"></div>
            </div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">Max Budget *<input type=hidden id=q3_required name=q3_required value=TRUE></div></div>
              <div class="col-sm-8 col-md-9"><input class="form-control" type=text name=question_3 maxlength=250></div>
              <div class="cf"></div>
            </div>
            <div class="form-group">
              <div class="col-sm-4 col-md-3 padding-tb-7"><div class="padding-lr-5">How did you hear about us?</div></div>
              <div class="col-sm-8 col-md-9"><input type=text name=req_source class="form-control" maxlength=50></div>
              <div class="cf"></div>
            </div>
            <div class="form-group"><p><label class="questiontitle"><input type=checkbox name=sms_consent value="true"> Tick to receive SMS updates about your event.</label></p></div>
            <div class="form-group"><p><label class="questiontitle"><input type=checkbox name=privacy_policy value="true"> I agree to the <a href="https://remixedent.com/privacy.asp?djidnumber=25716&view=websitetools" target="_blank">Privacy Policy</a>.</label></p></div>
            <input type='hidden' name='checkdate' value=''>
            <input type='hidden' name='djidnumber' value='25716'>
            <input type='hidden' name='action' value='add_information_request'>
          </div>
        </div>
        <p align="center"><input type=submit name=submit value="Send My Request →" class="formbutton"></p>
      </form>
    </div>
    <!-- END DJEVENTPLANNER CODE -->
  </div>

  <script>
    // Report document height to the parent so the iframe can size itself.
    function reportHeight() {
      var h = document.body.scrollHeight;
      parent.postMessage({ type: 'qf-height', height: h }, '*');
    }
    window.addEventListener('load', function () { reportHeight(); setTimeout(reportHeight, 600); });
    new ResizeObserver(reportHeight).observe(document.body);
  </script>
</body>
</html>
